<style>
  :root{
    --bg:#fef9c3;
    --paper:#fffde7;
    --ink:#111111;
    --easy:#16a34a;
    --easy-bg:#dcfce7;
    --medium:#1d4ed8;
    --medium-bg:#dbeafe;
    --hard:#ea580c;
    --hard-bg:#ffedd5;
    --vhard:#dc2626;
    --vhard-bg:#fee2e2;
    --accent:#facc15;
    --panel-border:3px solid #111;
    --shadow:5px 5px 0 #111;
    --shadow-sm:3px 3px 0 #111;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    background-color:#e8d5b0;
    background-image:
      radial-gradient(circle, #c4a882 1px, transparent 1px);
    background-size:18px 18px;
    color:var(--ink);
    font-family:'Comic Neue',cursive;
    min-height:100vh;
  }

  /* ── HEADER PANEL ── */
  header{
    background:#facc15;
    border-bottom:4px solid var(--ink);
    padding:2.5rem 2rem 2rem;
    text-align:center;
    position:relative;
    box-shadow:0 6px 0 #111;
  }

  /* starburst behind title */
  header::before{
    content:'';
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-54%);
    width:340px;height:340px;
    background:
      conic-gradient(
        #fff176 0deg 10deg, transparent 10deg 20deg,
        #fff176 20deg 30deg, transparent 30deg 40deg,
        #fff176 40deg 50deg, transparent 50deg 60deg,
        #fff176 60deg 70deg, transparent 70deg 80deg,
        #fff176 80deg 90deg, transparent 90deg 100deg,
        #fff176 100deg 110deg, transparent 110deg 120deg,
        #fff176 120deg 130deg, transparent 130deg 140deg,
        #fff176 140deg 150deg, transparent 150deg 160deg,
        #fff176 160deg 170deg, transparent 170deg 180deg,
        #fff176 180deg 190deg, transparent 190deg 200deg,
        #fff176 200deg 210deg, transparent 210deg 220deg,
        #fff176 220deg 230deg, transparent 230deg 240deg,
        #fff176 240deg 250deg, transparent 250deg 260deg,
        #fff176 260deg 270deg, transparent 270deg 280deg,
        #fff176 280deg 290deg, transparent 290deg 300deg,
        #fff176 300deg 310deg, transparent 310deg 320deg,
        #fff176 320deg 330deg, transparent 330deg 340deg,
        #fff176 340deg 350deg, transparent 350deg 360deg
      );
    border-radius:50%;
    opacity:.5;
    pointer-events:none;
    z-index:0;
  }

  header h1{
    font-family:'Bangers',cursive;
    font-size:clamp(3rem,8vw,6rem);
    letter-spacing:.06em;
    color:var(--ink);
    text-shadow:4px 4px 0 #fff,6px 6px 0 #111;
    position:relative;z-index:1;
    line-height:1;
    margin-bottom:.6rem;
  }

  /* speech bubble for subtitle */
  header p{
    display:inline-block;
    background:#fff;
    border:3px solid var(--ink);
    border-radius:20px 20px 20px 4px;
    padding:.5rem 1.2rem;
    font-family:'Comic Neue',cursive;
    font-weight:700;
    font-size:.95rem;
    color:var(--ink);
    position:relative;z-index:1;
    box-shadow:var(--shadow-sm);
    margin-bottom:1rem;
  }
  header p::after{
    content:'';
    position:absolute;
    bottom:-14px;left:20px;
    border:7px solid transparent;
    border-top-color:#111;
  }
  header p::before{
    content:'';
    position:absolute;
    bottom:-10px;left:21px;
    border:6px solid transparent;
    border-top-color:#fff;
    z-index:1;
  }

  .legend{
    display:flex;gap:1rem;justify-content:center;
    font-family:'Comic Neue',cursive;font-size:.8rem;
    flex-wrap:wrap;margin-top:1rem;position:relative;z-index:1;
  }
  .legend-item{
    display:flex;align-items:center;gap:.4rem;
    background:#fff;border:2px solid var(--ink);
    padding:.2rem .7rem;border-radius:999px;
    box-shadow:var(--shadow-sm);font-weight:700;
  }
  .dot-lc{width:10px;height:10px;border-radius:50%;background:#7c3aed;border:2px solid var(--ink);}

  /* ── CONTROLS PANEL ── */
  .controls{
    display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;
    padding:1rem 2rem;position:sticky;top:0;z-index:200;
    background:#60a5fa;
    border-bottom:3px solid var(--ink);
    box-shadow:0 4px 0 #111;
  }

  input[type="text"]{
    padding:.5rem 1rem;
    background:#fff;
    border:3px solid var(--ink);
    color:var(--ink);
    font-family:'Comic Neue',cursive;font-size:.9rem;font-weight:700;
    outline:none;width:260px;
    border-radius:6px;
    box-shadow:var(--shadow-sm);
    transition:transform .1s;
  }
  input[type="text"]:focus{transform:scale(1.02);}
  input[type="text"]::placeholder{color:#94a3b8;}

  .filter-btn{
    padding:.5rem 1.1rem;
    border:3px solid var(--ink);
    background:#fff;
    color:var(--ink);
    font-family:'Bangers',cursive;font-size:1rem;letter-spacing:.06em;
    cursor:pointer;
    border-radius:6px;
    box-shadow:var(--shadow-sm);
    transition:transform .1s,box-shadow .1s;
  }
  .filter-btn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 #111;}
  .filter-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #111;}
  .filter-btn.active{color:#fff;}
  .filter-btn.all.active{background:#111;}
  .filter-btn.easy.active{background:var(--easy);}
  .filter-btn.medium.active{background:var(--medium);}
  .filter-btn.hard.active{background:var(--hard);}
  .filter-btn.vhard.active{background:var(--vhard);}

  /* ── STATS BAR ── */
  .stats{
    display:flex;gap:1rem;justify-content:center;
    padding:.75rem 2rem;
    font-family:'Comic Neue',cursive;font-size:.85rem;font-weight:700;
    color:var(--ink);flex-wrap:wrap;
    background:#fde68a;
    border-bottom:3px solid var(--ink);
  }
  .stat-item{
    background:#fff;border:2px solid var(--ink);
    padding:.2rem .75rem;border-radius:6px;
    box-shadow:var(--shadow-sm);
  }
  .stat-item span{color:#dc2626;}

  /* ── TABLE PANEL ── */
  .table-wrap{
    max-width:1150px;margin:2rem auto;
    padding:0 1.5rem 4rem;
  }

  /* comic panel box */
  .table-wrap > table{
    background:var(--paper);
    border:4px solid var(--ink);
    border-radius:4px;
    box-shadow:8px 8px 0 #111;
  }

  table{width:100%;border-collapse:collapse;}

  thead{background:#111;}
  thead th{
    padding:.75rem 1rem;text-align:left;
    font-family:'Bangers',cursive;font-size:.95rem;
    color:#facc15;letter-spacing:.1em;
    border-right:2px solid #333;
  }
  thead th:last-child{border-right:none;}

  tbody tr{
    border-bottom:2px solid #e2e8f0;
    transition:background .1s,transform .1s;
  }
  tbody tr:nth-child(even){background:#f8f5e4;}
  tbody tr:hover{
    background:#fef9c3;
    outline:3px solid var(--ink);
    outline-offset:-3px;
  }
  tbody tr.hidden{display:none;}

  td{padding:.65rem 1rem;font-size:.9rem;font-family:'Comic Neue',cursive;}
  td.num{
    font-family:'Bangers',cursive;font-size:1.1rem;
    color:#94a3b8;width:52px;text-align:center;
    border-right:2px solid #e2e8f0;
  }

  /* problem name bold */
  tbody td:nth-child(2){font-weight:700;font-size:.95rem;}

  .diff-badge{
    display:inline-block;
    padding:.25rem .65rem;
    font-family:'Bangers',cursive;font-size:.85rem;
    letter-spacing:.08em;
    border:2px solid var(--ink);
    border-radius:4px;
    box-shadow:var(--shadow-sm);
  }
  .diff-easy{background:var(--easy-bg);color:var(--easy);}
  .diff-medium{background:var(--medium-bg);color:var(--medium);}
  .diff-hard{background:var(--hard-bg);color:var(--hard);}
  .diff-vhard{background:var(--vhard-bg);color:var(--vhard);}

  .lc-link{
    display:inline-flex;align-items:center;gap:.35rem;
    text-decoration:none;
    font-family:'Comic Neue',cursive;font-weight:700;font-size:.8rem;
    padding:.25rem .65rem;
    background:#7c3aed;color:#fff;
    border:2px solid var(--ink);border-radius:4px;
    box-shadow:var(--shadow-sm);
    transition:transform .1s,box-shadow .1s;
  }
  .lc-link:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 #111;}
  .lc-link:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #111;}

  .pb{
    font-size:.65rem;font-weight:700;padding:.1rem .35rem;
    border:2px solid var(--ink);border-radius:3px;
    background:#facc15;color:#111;
  }

  .topic-tag{
    display:inline-block;
    background:#e0e7ff;color:#3730a3;
    border:2px solid #3730a3;
    border-radius:999px;
    padding:.1rem .55rem;font-size:.75rem;
    font-family:'Comic Neue',cursive;font-weight:700;
  }

  /* scrollbar */
  ::-webkit-scrollbar{width:8px;background:#fde68a;}
  ::-webkit-scrollbar-thumb{background:#111;border-radius:4px;}

  /* ── RESPONSIVE ── */

  /* Tablet (≤768px) */
  @media(max-width:768px){
    header{padding:1.75rem 1rem 1.5rem;}
    header::before{width:220px;height:220px;}

    .controls{padding:.75rem 1rem;gap:.5rem;}
    input[type="text"]{width:100%;}
    .filter-btn{padding:.4rem .75rem;font-size:.9rem;}

    .stats{padding:.5rem 1rem;gap:.5rem;font-size:.78rem;}

    .table-wrap{padding:0 .75rem 3rem;margin:1rem auto;}
    .table-wrap > table{box-shadow:5px 5px 0 #111;}

    td,thead th{padding:.55rem .75rem;}
    td.topic,th.topic{display:none;}
  }

  /* Phone (≤500px) */
  @media(max-width:500px){
    header{padding:1.25rem .75rem 1.25rem;}
    header::before{width:160px;height:160px;}
    header h1{font-size:clamp(2rem,12vw,3rem);}
    header p{font-size:.8rem;padding:.4rem .9rem;}

    .controls{
      padding:.6rem .75rem;gap:.4rem;
      flex-wrap:wrap;
    }
    .controls input[type="text"]{flex:0 0 100%;}

    .filter-btn{font-size:.85rem;padding:.35rem .65rem;}

    .stats{gap:.4rem;padding:.5rem .75rem;}
    .stat-item{padding:.15rem .5rem;font-size:.75rem;}

    .table-wrap{padding:0 .5rem 2.5rem;margin:.75rem auto;}
    .table-wrap > table{box-shadow:3px 3px 0 #111;min-width:420px;}
    /* horizontal scroll on tiny screens */
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

    thead th{font-size:.8rem;padding:.5rem .6rem;}
    td{padding:.5rem .6rem;font-size:.82rem;}
    td.num{width:36px;font-size:.95rem;}
    tbody td:nth-child(2){font-size:.85rem;}

    .diff-badge{font-size:.72rem;padding:.18rem .45rem;}

    .lc-link{font-size:.72rem;padding:.2rem .5rem;}
  }
</style>
</head>

    row.dataset.diff=p.d;row.dataset.name=p.n.toLowerCase();row.dataset.topic=p.t.toLowerCase();
    const badge=`<span class="pb pb-lc">LC</span>`;
    row.innerHTML=`<td class="num">${i+1}</td><td>${p.n}</td>
    <td><span class="diff-badge diff-${dc(p.d)}">${p.d}</span></td>
    <td class="topic"><span class="topic-tag">${p.t}</span></td>
    <td><a class="lc-link lc" href="${p.l}" target="_blank">${badge} ↗ ${p.ln}</a></td>`;
    tb.appendChild(row);
  });
  document.getElementById('cEasy').textContent=c.Easy;
  document.getElementById('cMed').textContent=c.Medium;
  document.getElementById('cHard').textContent=c.Hard;
  document.getElementById('cVH').textContent=c['Very Hard'];
  applyFilters();
}
function setFilter(v,b){filter=v;document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');applyFilters();}
function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();let cnt=0;
  document.querySelectorAll('#tableBody tr').forEach(r=>{
    const ok=(filter==='all'||r.dataset.diff===filter)&&(!q||r.dataset.name.includes(q)||r.dataset.topic.includes(q));
    r.classList.toggle('hidden',!ok);if(ok)cnt++;
  });
  document.getElementById('countVisible').textContent=cnt;
}
render();
</script>
</body>
</html>
