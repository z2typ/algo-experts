<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Patterns!</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --white: #fffef0;
    --yellow: #FFE600;
    --red: #FF2D2D;
    --blue: #1565FF;
    --green: #00C44F;
    --orange: #FF8C00;
    --purple: #9B00FF;
    --pink: #FF3EA5;
    --shadow: 5px 5px 0px var(--black);
    --shadow-lg: 7px 7px 0px var(--black);
    --border: 3px solid var(--black);
    --border-thick: 4px solid var(--black);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--white);
    background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
    background-size: 20px 20px;
    font-family: 'Comic Neue', cursive;
    color: var(--black);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--yellow);
    border-bottom: var(--border-thick);
    padding: 32px 0 24px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.08) 1.5px, transparent 1.5px);
    background-size: 14px 14px;
    pointer-events: none;
  }

  .burst {
    position: absolute;
    font-family: 'Bangers', cursive;
    font-size: 22px;
    letter-spacing: 2px;
    padding: 12px 16px;
    border: 3px solid var(--black);
    border-radius: 4px;
    box-shadow: 4px 4px 0 var(--black);
    transform: rotate(-8deg);
    z-index: 2;
  }

  .burst-1 {
    background: var(--red);
    color: var(--white);
    top: 20px; right: 60px;
    animation: wobble 3s ease-in-out infinite;
  }

  .burst-2 {
    background: var(--blue);
    color: var(--white);
    bottom: 16px; right: 200px;
    font-size: 16px;
    transform: rotate(5deg);
    animation: wobble 2.5s ease-in-out infinite 0.5s;
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(-8deg) scale(1); }
    50% { transform: rotate(-6deg) scale(1.04); }
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  .header-eyebrow {
    font-family: 'Bangers', cursive;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--black);
    margin-bottom: 8px;
    opacity: 0;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards;
  }

  h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(3.5rem, 9vw, 7rem);
    line-height: 0.9;
    letter-spacing: 3px;
    color: var(--black);
    -webkit-text-stroke: 2px var(--black);
    text-shadow: 6px 6px 0 var(--red), 10px 10px 0 rgba(0,0,0,0.15);
    opacity: 0;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;
  }

  h1 em {
    font-style: normal;
    color: var(--red);
    -webkit-text-stroke: 2px var(--black);
    text-shadow: 6px 6px 0 var(--blue), 10px 10px 0 rgba(0,0,0,0.15);
  }

  .speech-bubble {
    position: relative;
    background: var(--white);
    border: var(--border-thick);
    border-radius: 18px;
    padding: 14px 20px;
    margin-top: 20px;
    display: inline-block;
    max-width: 520px;
    font-size: 15px;
    font-weight: 700;
    box-shadow: var(--shadow);
    opacity: 0;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.35s forwards;
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -20px; left: 40px;
    border: 10px solid transparent;
    border-bottom-color: var(--black);
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    top: -14px; left: 41px;
    border: 9px solid transparent;
    border-bottom-color: var(--white);
  }

  /* ===== SEARCH ===== */
  .search-area {
    padding: 28px 0 0;
    opacity: 0;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.45s forwards;
  }

  .search-wrapper {
    position: relative;
    display: inline-block;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    pointer-events: none;
  }

  .search-input {
    background: var(--white);
    border: var(--border-thick);
    border-radius: 8px;
    padding: 12px 16px 12px 44px;
    font-family: 'Comic Neue', cursive;
    font-size: 15px;
    font-weight: 700;
    width: 380px;
    max-width: 100%;
    outline: none;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .search-input:focus {
    transform: translate(-2px, -2px);
    box-shadow: var(--shadow-lg);
  }

  /* ===== FILTERS ===== */
  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 28px 0 24px;
    opacity: 0;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.5s forwards;
  }

  .filter-btn {
    font-family: 'Bangers', cursive;
    font-size: 16px;
    letter-spacing: 1.5px;
    background: var(--white);
    border: var(--border);
    border-radius: 6px;
    padding: 6px 18px;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--black);
    transition: transform 0.1s, box-shadow 0.1s;
    color: var(--black);
  }

  .filter-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 5px 5px 0 var(--black);
  }

  .filter-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--black);
  }

  .filter-btn.active {
    background: var(--black);
    color: var(--yellow);
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--red);
  }

  /* ===== GRID ===== */
  .patterns-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    padding-bottom: 60px;
  }

  /* ===== CARD ===== */
  .pattern-card {
    background: var(--white);
    border: var(--border-thick);
    border-radius: 12px;
    padding: 24px;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  .pattern-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 10px;
    background: var(--card-color, var(--yellow));
    border-bottom: 3px solid var(--black);
  }

  .pattern-card:hover {
    transform: translate(-4px, -4px) rotate(-0.5deg);
    box-shadow: 11px 11px 0 var(--black);
  }

  .pattern-card:active {
    transform: translate(2px, 2px);
    box-shadow: 3px 3px 0 var(--black);
  }

  .card-number {
    font-family: 'Bangers', cursive;
    font-size: 13px;
    letter-spacing: 2px;
    color: #888;
    margin-top: 6px;
    margin-bottom: 8px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 10px;
  }

  .difficulty {
    font-family: 'Bangers', cursive;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 3px 10px;
    border: 2px solid var(--black);
    border-radius: 4px;
    box-shadow: 2px 2px 0 var(--black);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .diff-easy { background: var(--green); color: var(--white); }
  .diff-medium { background: var(--orange); color: var(--white); }
  .diff-hard { background: var(--red); color: var(--white); }

  .card-title {
    font-family: 'Bangers', cursive;
    font-size: 26px;
    letter-spacing: 1.5px;
    line-height: 1.1;
    color: var(--black);
  }

  .card-desc {
    font-size: 13px;
    line-height: 1.65;
    color: #333;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }

  .tag {
    font-family: 'Bangers', cursive;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--black);
    border: 2px solid var(--black);
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--yellow);
  }

  .card-examples {
    font-size: 12px;
    color: #555;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-examples span {
    color: var(--blue);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--white);
    border: var(--border-thick);
    border-radius: 16px;
    max-width: 760px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 10px 10px 0 var(--black);
    transform: scale(0.85) rotate(-1deg);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }

  .modal-overlay.open .modal {
    transform: scale(1) rotate(0deg);
  }

  .modal-header {
    background: var(--modal-color, var(--yellow));
    border-bottom: var(--border-thick);
    padding: 24px 28px 20px;
    position: sticky;
    top: 0;
    z-index: 2;
    border-radius: 12px 12px 0 0;
  }

  .modal-header-num {
    font-family: 'Bangers', cursive;
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(0,0,0,0.5);
    margin-bottom: 4px;
  }

  .modal-header-title {
    font-family: 'Bangers', cursive;
    font-size: 36px;
    letter-spacing: 2px;
    line-height: 1;
    color: var(--black);
    text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    padding-right: 50px;
  }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    background: var(--red);
    border: 3px solid var(--black);
    color: var(--white);
    font-family: 'Bangers', cursive;
    font-size: 18px;
    letter-spacing: 1px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--black);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .modal-close:hover {
    transform: translate(-2px,-2px) rotate(-5deg);
    box-shadow: 5px 5px 0 var(--black);
  }

  .modal-body { padding: 28px; }

  .modal-section { margin-bottom: 28px; }

  .modal-section-title {
    font-family: 'Bangers', cursive;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--white);
    background: var(--black);
    display: inline-block;
    padding: 4px 14px;
    border-radius: 4px;
    margin-bottom: 14px;
    box-shadow: 3px 3px 0 var(--modal-color, var(--yellow));
  }

  .modal-section p {
    font-size: 14px;
    line-height: 1.75;
    color: #333;
  }

  /* Complexity */
  .complexity-row { display: flex; gap: 16px; flex-wrap: wrap; }

  .complexity-item {
    background: var(--black);
    color: var(--yellow);
    border: 3px solid var(--black);
    border-radius: 8px;
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    box-shadow: 4px 4px 0 var(--modal-color, var(--yellow));
  }

  .complexity-label {
    font-family: 'Bangers', cursive;
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.6;
  }

  .complexity-value {
    font-family: 'Bangers', cursive;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1;
  }

  /* Steps */
  .steps-list { list-style: none; counter-reset: steps; }

  .steps-list li {
    counter-increment: steps;
    font-size: 13px;
    line-height: 1.65;
    padding: 10px 12px 10px 48px;
    border: 2px solid var(--black);
    border-radius: 8px;
    margin-bottom: 8px;
    background: var(--white);
    position: relative;
    box-shadow: 3px 3px 0 var(--black);
    font-weight: 700;
  }

  .steps-list li::before {
    content: counter(steps);
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 36px;
    background: var(--black);
    color: var(--yellow);
    font-family: 'Bangers', cursive;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px 0 0 6px;
    letter-spacing: 1px;
  }

  /* Code block */
  .code-wrapper { position: relative; }

  .code-block {
    background: #1a1a2e;
    border: var(--border-thick);
    border-radius: 10px;
    padding: 44px 20px 20px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12.5px;
    line-height: 1.9;
    overflow-x: auto;
    white-space: pre;
    tab-size: 4;
    box-shadow: 5px 5px 0 var(--black);
    color: #e8e8f0;
  }

  .code-block .comment { color: #6272a4; font-style: italic; }
  .code-block .keyword { color: #ff79c6; font-weight: bold; }
  .code-block .func { color: #50fa7b; }
  .code-block .str { color: #f1fa8c; }
  .code-block .num { color: #bd93f9; }

  .copy-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: var(--yellow);
    border: 2px solid var(--black);
    color: var(--black);
    font-family: 'Bangers', cursive;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--black);
    transition: transform 0.1s, box-shadow 0.1s;
    z-index: 1;
  }

  .copy-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--black); }
  .copy-btn.copied { background: var(--green); color: var(--white); }

  /* Use cases */
  .use-cases { display: flex; flex-wrap: wrap; gap: 8px; }

  .use-case-chip {
    font-family: 'Bangers', cursive;
    font-size: 14px;
    letter-spacing: 1px;
    padding: 5px 14px;
    background: var(--white);
    border: 2px solid var(--black);
    border-radius: 6px;
    box-shadow: 3px 3px 0 var(--black);
    cursor: default;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .use-case-chip:hover {
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 var(--black);
    background: var(--yellow);
  }

  /* Empty state */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    font-family: 'Bangers', cursive;
    font-size: 32px;
    letter-spacing: 2px;
    color: #aaa;
  }

  /* Footer */
  footer {
    border-top: var(--border-thick);
    background: var(--black);
    padding: 20px 0;
  }

  footer .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  footer .footer-text {
    font-family: 'Bangers', cursive;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--yellow);
  }

  .stat-badge {
    background: var(--yellow);
    border: 3px solid var(--white);
    border-radius: 8px;
    padding: 6px 18px;
    font-family: 'Bangers', cursive;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--black);
    box-shadow: 4px 4px 0 rgba(255,255,255,0.3);
  }

  /* Animations */
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7) rotate(-3deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--white); border-left: 2px solid var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--black); border-radius: 4px; }

  /* ===== TOP NAV ===== */
  .topnav {
    background: var(--black);
    border-bottom: 3px solid var(--yellow);
    padding: 10px 0;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topnav-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .topnav-brand {
    font-family: 'Bangers', cursive;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--yellow);
  }

  body.dark .topnav {
    background: #0a0a12;
    border-bottom-color: var(--yellow);
  }

  /* ===== THEME TOGGLE BUTTON ===== */
  .theme-toggle {
    background: var(--black);
    color: var(--yellow);
    border: 3px solid var(--yellow);
    border-radius: 50px;
    padding: 10px 20px;
    font-family: 'Bangers', cursive;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--yellow);
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s, background 0.3s, color 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .theme-toggle:hover {
    transform: translate(-3px, -3px) rotate(-2deg);
    box-shadow: 7px 7px 0 var(--yellow);
  }

  .theme-toggle:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--yellow);
  }

  .toggle-icon {
    font-size: 20px;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    display: inline-block;
  }

  /* ===== DARK THEME ===== */
  body.dark {
    background-color: #111118;
    background-image: radial-gradient(circle, #2a2a3a 1px, transparent 1px);
    color: #f0f0ff;
  }

  body.dark header {
    background: #1a1a2e;
    border-bottom-color: var(--yellow);
  }

  body.dark header::before {
    background-image: radial-gradient(circle, rgba(255,230,0,0.06) 1.5px, transparent 1.5px);
  }

  body.dark h1 {
    color: var(--yellow);
    -webkit-text-stroke: 2px var(--yellow);
    text-shadow: 6px 6px 0 var(--red), 10px 10px 0 rgba(0,0,0,0.5);
  }

  body.dark h1 em {
    color: var(--red);
    -webkit-text-stroke: 2px var(--yellow);
  }

  body.dark .header-eyebrow { color: var(--yellow); }

  body.dark .speech-bubble {
    background: #1e1e30;
    border-color: var(--yellow);
    color: #f0f0ff;
    box-shadow: 5px 5px 0 var(--yellow);
  }

  body.dark .speech-bubble::before { border-bottom-color: var(--yellow); }
  body.dark .speech-bubble::after { border-bottom-color: #1e1e30; }

  body.dark .search-input {
    background: #1e1e30;
    border-color: var(--yellow);
    color: #f0f0ff;
    box-shadow: 5px 5px 0 var(--yellow);
  }

  body.dark .search-input:focus {
    box-shadow: 7px 7px 0 var(--yellow);
  }

  body.dark .search-input::placeholder { color: #666; }

  body.dark .filter-btn {
    background: #1e1e30;
    border-color: #444;
    color: #ccc;
    box-shadow: 3px 3px 0 #444;
  }

  body.dark .filter-btn:hover {
    border-color: var(--yellow);
    color: var(--yellow);
    box-shadow: 5px 5px 0 var(--yellow);
  }

  body.dark .filter-btn.active {
    background: var(--yellow);
    color: #111;
    border-color: var(--yellow);
    box-shadow: 4px 4px 0 var(--red);
  }

  body.dark .pattern-card {
    background: #1a1a2e;
    border-color: #444;
    box-shadow: 7px 7px 0 #444;
  }

  body.dark .pattern-card::before {
    border-bottom-color: #444;
  }

  body.dark .pattern-card:hover {
    border-color: var(--yellow);
    box-shadow: 11px 11px 0 var(--yellow);
  }

  body.dark .card-title { color: #f0f0ff; }

  body.dark .card-desc { color: #aaa; }

  body.dark .card-number { color: #555; }

  body.dark .card-examples { color: #777; }

  body.dark .card-examples span { color: #7eb8ff; }

  body.dark .tag {
    background: #2a2a3a;
    border-color: #555;
    color: var(--yellow);
  }

  body.dark .difficulty {
    border-color: #555;
    box-shadow: 2px 2px 0 #555;
  }

  body.dark .modal {
    background: #14141f;
    border-color: #555;
    box-shadow: 10px 10px 0 var(--yellow);
  }

  body.dark .modal-header-num { color: rgba(255,255,255,0.4); }
  body.dark .modal-header-title { color: #111; }

  body.dark .modal-body { background: #14141f; }

  body.dark .modal-section p { color: #bbb; }

  body.dark .steps-list li {
    background: #1e1e30;
    border-color: #444;
    color: #ddd;

    examples: "Daily Temperatures, Largest Rectangle in Histogram, Next Greater Element",
    timeComplexity: "O(n)",
    spaceComplexity: "O(n)",
    when: ["Next greater/smaller element", "Span calculation", "Histogram problems", "Trapping rain water"],
    steps: [
      "Initialize empty stack to store indices.",
      "Iterate through array. While stack non-empty and current element breaks monotonicity, pop and resolve.",
      "The popped element's answer is the current index (or element).",
      "Push current index onto stack. Remaining elements have no next greater/smaller."
    ],
    useCases: ["Daily Temperatures", "Next Greater Element", "Largest Rectangle", "Trapping Rain Water", "Sum of Subarray Minimums"],
    code: `<span class="keyword">def</span> <span class="func">daily_temperatures</span>(temps):
    n = len(temps)
    result = [<span class="num">0</span>] * n
    stack = []  <span class="comment"># monotonic decreasing stack of indices</span>

    <span class="keyword">for</span> i, t <span class="keyword">in</span> enumerate(temps):
        <span class="keyword">while</span> stack <span class="keyword">and</span> temps[stack[-<span class="num">1</span>]] < t:
            j = stack.pop()
            result[j] = i - j  <span class="comment"># days to wait</span>
        stack.append(i)

    <span class="keyword">return</span> result`
  },
  {
    id: 14,
    title: "Trie",
    difficulty: "medium",
    categories: ["trees"],
    desc: "Prefix tree for efficient string search, autocomplete, and word validation in O(L) time per operation.",

    steps: [
      "Node has children dict and is_end flag.",
      "Insert: for each char, create child if missing, move to child. Mark end.",
      "Search: for each char, return False if child missing, else traverse. Return is_end.",
      "Starts_with: same as search but return True when string is consumed."
    ],
    useCases: ["Autocomplete", "Word Search II", "Add and Search Words", "Replace Words", "Maximum XOR"],
    code: `<span class="keyword">class</span> <span class="func">TrieNode</span>:
    <span class="keyword">def</span> <span class="func">__init__</span>(self):
        self.children = {}
        self.is_end = <span class="keyword">False</span>

<span class="keyword">class</span> <span class="func">Trie</span>:
    <span class="keyword">def</span> <span class="func">__init__</span>(self):
        self.root = TrieNode()

    <span class="keyword">def</span> <span class="func">insert</span>(self, word):
        node = self.root
        <span class="keyword">for</span> ch <span class="keyword">in</span> word:
            <span class="keyword">if</span> ch <span class="keyword">not in</span> node.children:
                node.children[ch] = TrieNode()
            node = node.children[ch]
        node.is_end = <span class="keyword">True</span>

    <span class="keyword">def</span> <span class="func">search</span>(self, word):
        node = self.root
        <span class="keyword">for</span> ch <span class="keyword">in</span> word:
            <span class="keyword">if</span> ch <span class="keyword">not in</span> node.children:
                <span class="keyword">return False</span>
            node = node.children[ch]
        <span class="keyword">return</span> node.is_end`

    id: 15,

    difficulty: "hard",

    tags: ["Graph", "Connected Components", "Cycle"],

    timeComplexity: "O(a(n))",
    spaceComplexity: "O(n)",
    when: ["Dynamic connectivity", "Kruskal's MST", "Cycle detection in undirected graph", "Grouping/merging sets"],
    steps: [
      "Initialize parent[i] = i and rank[i] = 0 for all nodes.",
      "Find(x): return root with path compression (parent[x] = find(parent[x])).",
      "Union(x, y): find roots of both; attach smaller rank tree under larger.",
      "Connected(x, y): return find(x) == find(y)."
    ],
    useCases: ["Number of Components", "Redundant Connection", "Kruskal's MST", "Accounts Merge", "Satisfiability of Equality Equations"],
    code: `<span class="keyword">class</span> <span class="func">UnionFind</span>:
    <span class="keyword">def</span> <span class="func">__init__</span>(self, n):
        self.parent = list(range(n))
        self.rank   = [<span class="num">0</span>] * n

    <span class="keyword">def</span> <span class="func">find</span>(self, x):
        <span class="keyword">if</span> self.parent[x] != x:
            self.parent[x] = self.find(self.parent[x])
        <span class="keyword">return</span> self.parent[x]

    <span class="keyword">def</span> <span class="func">union</span>(self, x, y):
        px, py = self.find(x), self.find(y)
        <span class="keyword">if</span> px == py: <span class="keyword">return False</span>
        <span class="keyword">if</span> self.rank[px] < self.rank[py]: px, py = py, px
        self.parent[py] = px
        <span class="keyword">if</span> self.rank[px] == self.rank[py]:
            self.rank[px] += <span class="num">1</span>
        <span class="keyword">return True</span>`
  }

// ===== RENDER =====
function render(data) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('visibleCount').textContent = data.length;

  if (data.length === 0) {
    grid.innerHTML = '<div class="empty">😵 NO PATTERNS FOUND! TRY AGAIN!</div>';
    return;
  }

  data.forEach((p, idx) => {
    const color = CARD_COLORS[(p.id - 1) % CARD_COLORS.length];
    const card = document.createElement('div');
    card.className = 'pattern-card';
    card.style.setProperty('--card-color', color);
    card.style.animationDelay = `${idx * 0.05}s`;

    const diffClass = `diff-${p.difficulty}`;
    const diffEmoji = p.difficulty === 'easy' ? '🟢' : p.difficulty === 'medium' ? '🟠' : '🔴';

    card.innerHTML = `
      <div class="card-number">PATTERN #${String(p.id).padStart(2,'0')}</div>
      <div class="card-header">
        <div class="card-title">${p.title}</div>
        <div class="difficulty ${diffClass}">${diffEmoji} ${p.difficulty.toUpperCase()}</div>
      </div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="card-examples">💡 <span>${p.examples.split(',')[0].trim()}</span> + ${p.examples.split(',').length - 1} more</div>
    `;

    card.addEventListener('click', () => openModal(p, color));
    grid.appendChild(card);
  });
}

// ===== FILTER =====
let activeFilter = 'all';

function filterData() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  return patterns.filter(p => {
    const matchFilter = activeFilter === 'all' || activeFilter === p.difficulty || p.categories.includes(activeFilter);
    const matchSearch = !query || p.title.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query) || p.tags.some(t => t.toLowerCase().includes(query)) || p.examples.toLowerCase().includes(query);
    return matchFilter && matchSearch;
  });
}

document.getElementById('searchInput').addEventListener('input', () => render(filterData()));

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.filter;
  render(filterData());
});

// ===== MODAL =====
function openModal(p, color) {
  document.getElementById('modalNumber').textContent = `PATTERN #${String(p.id).padStart(2,'0')}`;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalHeader').style.background = color || '#FFE600';
  document.getElementById('modal').style.setProperty('--modal-color', color || '#FFE600');

  const diffEmoji = p.difficulty === 'easy' ? '🟢' : p.difficulty === 'medium' ? '🟠' : '🔴';

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">📖 OVERVIEW</div>
      <p>${p.desc}</p>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">⚡ COMPLEXITY</div>
      <div class="complexity-row">
        <div class="complexity-item">
          <span class="complexity-label">TIME</span>
          <span class="complexity-value">${p.timeComplexity}</span>
        </div>
        <div class="complexity-item">
          <span class="complexity-label">SPACE</span>
          <span class="complexity-value">${p.spaceComplexity}</span>
        </div>
        <div class="complexity-item">
          <span class="complexity-label">LEVEL</span>
          <span class="complexity-value">${diffEmoji} ${p.difficulty.toUpperCase()}</span>
        </div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">🎯 WHEN TO USE</div>
      <ul class="steps-list">
        ${p.when.map(w => `<li>${w}</li>`).join('')}
      </ul>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">🔢 ALGORITHM STEPS</div>
      <ul class="steps-list">
        ${p.steps.map(s => `<li>${s}</li>`).join('')}
      </ul>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">💻 CODE TEMPLATE</div>
      <div class="code-wrapper">
        <button class="copy-btn" onclick="copyCode(this)">📋 COPY</button>
        <pre class="code-block">${p.code}</pre>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">🏆 CLASSIC PROBLEMS</div>
      <div class="use-cases">
        ${p.useCases.map(u => `<span class="use-case-chip">${u}</span>`).join('')}
      </div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('open');
});

// ===== COPY =====
function copyCode(btn) {
  const pre = btn.nextElementSibling;
  navigator.clipboard.writeText(pre.innerText).then(() => {
    btn.textContent = '✅ COPIED!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 COPY'; btn.classList.remove('copied'); }, 2000);
  });
}

// ===== THEME TOGGLE =====
let isDark = false;

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  const icon = document.getElementById('toggleIcon');
  const label = document.getElementById('toggleLabel');
  icon.style.transform = 'rotate(360deg) scale(1.3)';
  setTimeout(() => { icon.style.transform = ''; }, 400);
  if (isDark) {
    icon.textContent = '☀️';
    label.textContent = 'LIGHT MODE';
  } else {
    icon.textContent = '🌙';
    label.textContent = 'DARK MODE';
  }
  localStorage.setItem('comicTheme', isDark ? 'dark' : 'light');
}

// Restore saved theme
(function() {
  try {
    if (localStorage.getItem('comicTheme') === 'dark') {
      isDark = true;
      document.body.classList.add('dark');
      document.getElementById('toggleIcon').textContent = '☀️';
      document.getElementById('toggleLabel').textContent = 'LIGHT MODE';
    }
  } catch(e) {}
})();

render(patterns);
</script>
